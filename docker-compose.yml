services:
  backend:
    build:
      context: .
      dockerfile: back/Dockerfile
    env_file:
      - back/.env
    environment:
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CORS_ALLOW_ALL_ORIGINS: "True"
      SQLITE_PATH: /data/db.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/data
      - backend_media:/app/back/media

  frontend:
    build:
      context: .
      dockerfile: front/Dockerfile
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  backend_data:
  backend_media:
